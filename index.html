<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#fdfaf4">
<title>Llega Luca</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  color: #2a3142;
  background: linear-gradient(180deg, #fdfaf4 0%, #f6ede0 100%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ==== HEADER ==== */
.top-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 8px;
}
.top-bar a {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #8a7e6b;
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 6px;
  transition: color .2s;
}
.top-bar a:hover { color: #1f2742; }

.header { text-align: center; margin-bottom: 32px; }
.header h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600;
  font-size: clamp(44px, 9vw, 72px);
  letter-spacing: -0.02em;
  color: #1f2742;
  margin: 8px 0 6px;
  line-height: 1;
}
.header .sub {
  font-size: 13px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #8a7e6b;
  font-weight: 500;
}

/* ==== CARDS ==== */
.card {
  background: #ffffff;
  border-radius: 18px;
  box-shadow: 0 6px 28px rgba(20,30,60,0.06);
  padding: 24px;
  margin-bottom: 20px;
}

/* ==== COUNTDOWN ==== */
.countdown-card { text-align: center; padding: 28px 24px 24px; position: relative; overflow: hidden; }
.countdown-card.celebrate {
  background: linear-gradient(135deg, #fffaf0, #fff4e3);
  box-shadow: 0 6px 28px rgba(217,147,72,0.25), 0 0 0 1px rgba(245,185,107,0.4);
  animation: bornGlow 3s ease-in-out infinite alternate;
}
@keyframes bornGlow {
  0%   { box-shadow: 0 6px 28px rgba(217,147,72,0.20), 0 0 0 1px rgba(245,185,107,0.35); }
  100% { box-shadow: 0 8px 36px rgba(232,117,91,0.35), 0 0 0 1px rgba(232,117,91,0.45); }
}
.birth-box {
  display: none;
  align-items: center;
  justify-content: space-around;
  background: linear-gradient(135deg, #fff7ea, #ffe9cf);
  border: 1px solid #f3d4a3;
  border-radius: 14px;
  padding: 14px 18px;
  margin: 16px auto 0;
  text-align: center;
  box-shadow: 0 4px 14px rgba(217,147,72,0.15);
  max-width: 360px;
}
.birth-box.show { display: flex; }
.birth-box-cell { flex: 1; }
.birth-box .bb-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #b07a3a;
  font-weight: 600;
  margin-bottom: 4px;
}
.birth-box .bb-value {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600;
  color: #1f2742;
  font-size: 22px;
  line-height: 1.1;
}
.birth-box .bb-divider {
  width: 1px; height: 28px;
  background: #e8c896;
  margin: 0 8px;
}
.cd-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 18px;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #8a7e6b;
}
.cd-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #f5b96b;
  box-shadow: 0 0 0 0 rgba(245,185,107,0.6);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,185,107,0.6); }
  50%      { box-shadow: 0 0 0 10px rgba(245,185,107,0); }
}
.cd-status {
  font-weight: 600;
  color: #c97a4a;
  letter-spacing: 0.16em;
  padding: 3px 10px;
  background: #fcefe1;
  border-radius: 999px;
  font-size: 10px;
}
.cd-status.born { color: #2f7a48; background: #e3f3e8; }

.cd-clock {
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-weight: 700;
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 4px;
  color: #1f2742;
  font-size: clamp(28px, 7vw, 44px);
  margin: 6px 0;
}
.cd-sign { color: #c97a4a; font-size: 0.7em; margin-right: 6px; }
.cd-seg { display: flex; flex-direction: column; align-items: center; min-width: 56px; }
.cd-num { font-size: 1em; line-height: 1; color: #1f2742; }
.cd-num.amber { color: #d99348; }
.cd-lbl {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #a89880;
  margin-top: 6px;
  font-weight: 500;
}
.cd-sep { color: #d2c5ad; font-size: 0.85em; padding: 0 2px; align-self: flex-start; margin-top: 4px; }

.cd-suspense {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(36px, 8vw, 56px);
  letter-spacing: 0.4em;
  color: #d99348;
  padding: 6px 0 4px;
  animation: shimmer 1.6s ease-in-out infinite;
}
@keyframes shimmer {
  0%, 100% { opacity: 0.55; }
  50%      { opacity: 1; }
}


.cd-admin-actions {
  margin-top: 18px;
  display: none;
}
body.is-admin .cd-admin-actions { display: block; }

/* ==== BUTTONS ==== */
.btn {
  display: inline-block;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .1s, opacity .2s, box-shadow .2s;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: linear-gradient(135deg, #ec8567, #d05a3a);
  color: #fff;
  box-shadow: 0 4px 14px rgba(208,90,58,0.25);
}
.btn-primary:hover { box-shadow: 0 6px 18px rgba(208,90,58,0.35); }
.btn-ghost {
  background: transparent;
  color: #8a7e6b;
  font-size: 12px;
  padding: 6px 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.btn-ghost:hover { color: #1f2742; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ==== ADMIN POST FORM ==== */
.admin-post {
  display: none;
  background: #fffaf2;
  border: 1px dashed #e8c896;
}
body.is-admin .admin-post { display: block; }
.admin-post .label {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #c97a4a;
  font-weight: 600;
  margin-bottom: 10px;
}

textarea, input[type="text"], input[type="email"], input[type="number"], input[type="datetime-local"] {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #ece2cf;
  background: #ffffff;
  font-family: inherit;
  font-size: 15px;
  color: #2a3142;
  resize: vertical;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
textarea:focus, input[type="text"]:focus, input[type="email"]:focus, input[type="number"]:focus, input[type="datetime-local"]:focus {
  border-color: #d99348;
  box-shadow: 0 0 0 3px rgba(217,147,72,0.15);
}
textarea { min-height: 70px; }
.form-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 10px;
  flex-wrap: wrap;
}
input[type="file"] {
  flex: 1;
  min-width: 160px;
  font-size: 13px;
  font-family: inherit;
  color: #6e6552;
}
input[type="file"]::file-selector-button {
  font-family: inherit;
  font-size: 12px;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid #ece2cf;
  background: #fff;
  color: #5e5444;
  margin-right: 10px;
  cursor: pointer;
}
.form-error {
  color: #c0392b;
  font-size: 13px;
  margin-top: 8px;
  display: none;
}

/* ==== UPDATES FEED ==== */
.feed-empty {
  text-align: center;
  color: #a89880;
  font-style: italic;
  padding: 30px 10px;
  font-size: 14px;
}
.update {
  position: relative;
}
.update-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.update-time {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #a89880;
  font-weight: 500;
}
.update-text {
  font-size: 16px;
  line-height: 1.55;
  white-space: pre-wrap;
  color: #2a3142;
}
.update-photo {
  display: block;
  width: 100%;
  max-height: 460px;
  object-fit: cover;
  border-radius: 12px;
  margin-top: 12px;
  cursor: zoom-in;
  transition: transform .25s;
}
.update-photo:hover { transform: scale(1.005); }
.update-del {
  display: none;
  background: transparent;
  border: none;
  color: #c97a4a;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.update-del:hover { background: #fcefe1; }
body.is-admin .update-del { display: inline-block; }

/* ==== COMMENTS ==== */
.comments {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid #f1e8d6;
}
.comments-title {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #a89880;
  font-weight: 600;
  margin-bottom: 10px;
}
.comment {
  padding: 8px 0;
  font-size: 14px;
  line-height: 1.5;
}
.comment + .comment { border-top: 1px solid #f7f0e3; }
.comment-name { font-weight: 600; color: #1f2742; }
.comment-text { color: #2a3142; }
.comment-time { color: #b5a489; font-size: 12px; margin-left: 6px; }
.comments-empty { color: #b5a489; font-size: 13px; font-style: italic; padding: 4px 0; }

.comment-form {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-direction: column;
}
.comment-form .name-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}
.comment-form .name-row input { flex: 0 0 140px; }
.comment-form .name-row textarea { flex: 1; min-height: 42px; }
.comment-form .actions {
  display: flex;
  justify-content: flex-end;
}
.comment-form .btn-primary {
  padding: 7px 16px;
  font-size: 13px;
}

/* ==== FOOTER ==== */
.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  color: #b5a489;
}
.footer a { color: #8a7e6b; text-decoration: none; }
.footer a:hover { color: #2a3142; }

/* ==== TOAST ==== */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1f2742;
  color: #fff;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  z-index: 9000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#toast.error { background: #b9442b; }
#toast.success { background: #2f7a48; }

/* ==== MODAL (login) ==== */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(31,39,66,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9500;
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 18px;
  padding: 28px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(20,30,60,0.25);
}
.modal h2 {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  margin: 0 0 6px;
  font-size: 22px;
  color: #1f2742;
}
.modal p {
  font-size: 13px;
  color: #8a7e6b;
  margin: 0 0 18px;
}
.modal input { margin-bottom: 10px; }
.modal-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
}

/* ==== LIGHTBOX ==== */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(15,18,30,0.94);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  cursor: zoom-out;
  padding: 20px;
}
.lightbox img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 6px;
  box-shadow: 0 12px 50px rgba(0,0,0,0.5);
}

@media (max-width: 480px) {
  .container { padding: 20px 14px 50px; }
  .card { padding: 20px 18px; border-radius: 14px; }
  .countdown-card { padding: 22px 18px 20px; }
  .cd-seg { min-width: 44px; }
  .comment-form .name-row { flex-direction: column; }
  .comment-form .name-row input { flex: 1; }
}
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <a href="#" id="admin-link">Soy Daddey</a>
  </div>

  <div class="header">
    <h1 id="page-title">Llega Luca</h1>
  </div>

  <!-- COUNTDOWN -->
  <div class="card countdown-card" id="cd-card">
    <div class="cd-strip">
      <span class="cd-dot"></span>
      <span>Cuenta atrás</span>
      <span class="cd-status" id="cd-status">PROGRAMADO</span>
    </div>
    <div id="cd-display"></div>
    <div class="birth-box" id="birth-box">
      <div class="birth-box-cell">
        <div class="bb-label">Nació a las:</div>
        <div class="bb-value" id="bb-time">—</div>
      </div>
      <div class="bb-divider"></div>
      <div class="birth-box-cell">
        <div class="bb-label">Peso:</div>
        <div class="bb-value" id="bb-weight">—</div>
      </div>
    </div>
    <div class="cd-admin-actions">
      <button class="btn btn-primary" id="btn-born">Marcar como nacido</button>
    </div>
  </div>

  <!-- ADMIN POST FORM -->
  <div class="card admin-post" id="admin-post">
    <div class="label">Nueva actualización</div>
    <textarea id="up-text" placeholder="Comparte una actualización…" maxlength="4000" rows="3"></textarea>
    <div class="form-row">
      <input type="file" id="up-photo" accept="image/*">
      <button class="btn btn-primary" id="up-submit">Publicar</button>
    </div>
    <div id="up-error" class="form-error"></div>
  </div>

  <!-- FEED -->
  <div id="feed">
    <div class="feed-empty">Aún no hay actualizaciones.</div>
  </div>

  <div class="footer">
    Hecho con ♥ · <a href="parental-leave.html">Plan de paternidad</a>
  </div>
</div>

<!-- Birth modal -->
<div class="modal-bg" id="birth-modal">
  <div class="modal">
    <h2>¡Bienvenido Luca!</h2>
    <p>Hora exacta y peso al nacer.</p>
    <input type="datetime-local" id="birth-when">
    <input type="number" id="birth-weight" placeholder="Peso en gramos (ej. 3450)" min="500" max="7000" step="1">
    <div id="birth-error" class="form-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="birth-cancel">Cancelar</button>
      <button class="btn btn-primary" id="birth-submit">Confirmar nacimiento</button>
    </div>
  </div>
</div>

<!-- Login modal -->
<div class="modal-bg" id="login-modal">
  <div class="modal">
    <h2>Hola Luis</h2>
    <p>Inicia sesión para publicar actualizaciones.</p>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="text" id="login-pass" placeholder="Contraseña" style="-webkit-text-security: disc; text-security: disc;">
    <div id="login-error" class="form-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="login-cancel">Cancelar</button>
      <button class="btn btn-primary" id="login-submit">Entrar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  const SUPABASE_URL = 'https://voirsxfjdayhhvwviaqt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvaXJzeGZqZGF5aGh2d3ZpYXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTU3NjcsImV4cCI6MjA5MTY5MTc2N30.Jm-_Bzsxep9nl8PIvozQISiuPR_GzK_2hKJTCUGHUWM';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

  const TARGET = new Date(2026, 3, 17, 12, 0, 0); // 17 Abr 2026 12:00
  const BUCKET = 'birth-photos';
  const PUBLIC_BASE = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/';
  const MAX_PHOTO = 10 * 1024 * 1024;

  let isAdmin = false;
  let bornAt = null;
  let weightGrams = null;
  let hasFiredConfetti = false;
  let updates = [];
  const commentsByUpdate = new Map();

  // ---------- Toast ----------
  const toastEl = document.getElementById('toast');
  let toastTimer;
  function toast(msg, kind) {
    toastEl.textContent = msg;
    toastEl.className = 'show ' + (kind || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastEl.className = ''; }, 3000);
  }

  // ---------- Lightbox ----------
  function openLightbox(src) {
    const overlay = document.createElement('div');
    overlay.className = 'lightbox';
    const img = document.createElement('img');
    img.src = src;
    overlay.appendChild(img);
    const close = () => { overlay.remove(); document.removeEventListener('keydown', onKey); };
    const onKey = (e) => { if (e.key === 'Escape') close(); };
    overlay.addEventListener('click', close);
    document.addEventListener('keydown', onKey);
    document.body.appendChild(overlay);
  }

  // ---------- Time helpers ----------
  function pad(n) { return String(n).padStart(2, '0'); }
  function relTime(iso) {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'ahora';
    if (diff < 3600) return 'hace ' + Math.floor(diff/60) + ' min';
    if (diff < 86400) return 'hace ' + Math.floor(diff/3600) + ' h';
    if (diff < 86400*7) return 'hace ' + Math.floor(diff/86400) + ' d';
    return pad(d.getDate()) + '-' + pad(d.getMonth()+1) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function absTime(iso) {
    const d = new Date(iso);
    return pad(d.getDate()) + '-' + pad(d.getMonth()+1) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  // ---------- Countdown ----------
  const cdDisplay = document.getElementById('cd-display');
  const cdStatus = document.getElementById('cd-status');

  function renderClock(diffMs, sign) {
    const totalSec = Math.floor(Math.abs(diffMs) / 1000);
    const days = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400) / 3600);
    const mins = Math.floor((totalSec % 3600) / 60);
    const secs = totalSec % 60;
    cdDisplay.innerHTML =
      '<div class="cd-clock">' +
        '<span class="cd-sign">' + sign + '</span>' +
        '<div class="cd-seg"><div class="cd-num amber">' + pad(days) + '</div><div class="cd-lbl">DÍAS</div></div>' +
        '<div class="cd-sep">:</div>' +
        '<div class="cd-seg"><div class="cd-num">' + pad(hours) + '</div><div class="cd-lbl">HRS</div></div>' +
        '<div class="cd-sep">:</div>' +
        '<div class="cd-seg"><div class="cd-num">' + pad(mins) + '</div><div class="cd-lbl">MIN</div></div>' +
        '<div class="cd-sep">:</div>' +
        '<div class="cd-seg"><div class="cd-num">' + pad(secs) + '</div><div class="cd-lbl">SEG</div></div>' +
      '</div>';
  }

  const cdCard = document.getElementById('cd-card');
  const birthBox = document.getElementById('birth-box');
  const bbTime = document.getElementById('bb-time');
  const bbWeight = document.getElementById('bb-weight');

  function fmtWeight(g) {
    if (!g) return '—';
    return g + ' g';
  }

  const pageTitle = document.getElementById('page-title');
  function updateBirthBox() {
    if (bornAt) {
      const d = new Date(bornAt);
      bbTime.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes());
      bbWeight.textContent = fmtWeight(weightGrams);
      birthBox.classList.add('show');
      cdCard.classList.add('celebrate');
      pageTitle.textContent = '¡Llegó Luca!';
      document.title = '¡Llegó Luca!';
    } else {
      birthBox.classList.remove('show');
      cdCard.classList.remove('celebrate');
      pageTitle.textContent = 'Llega Luca';
      document.title = 'Llega Luca';
    }
  }

  function tick() {
    const now = Date.now();
    if (bornAt) {
      cdStatus.textContent = 'NACIDO';
      cdStatus.classList.add('born');
      renderClock(now - new Date(bornAt).getTime(), 'T+');
    } else if (now < TARGET.getTime()) {
      cdStatus.textContent = 'PROGRAMADO';
      cdStatus.classList.remove('born');
      renderClock(TARGET.getTime() - now, 'T−');
    } else {
      cdStatus.textContent = 'EN CURSO';
      cdStatus.classList.remove('born');
      cdDisplay.innerHTML = '<div class="cd-suspense">. . .</div>';
    }
  }
  setInterval(tick, 1000);
  tick();

  // ---------- Confetti ----------
  function fireConfetti() {
    if (typeof confetti !== 'function') return;
    const colors = ['#f5b96b', '#e8755b', '#fce4b5', '#7a9d6b', '#1f2742', '#ffffff'];
    confetti({ particleCount: 140, spread: 90, origin: { y: 0.55 }, colors });
    setTimeout(() => confetti({ particleCount: 80, angle: 60, spread: 70, origin: { x: 0, y: 0.6 }, colors }), 250);
    setTimeout(() => confetti({ particleCount: 80, angle: 120, spread: 70, origin: { x: 1, y: 0.6 }, colors }), 250);
    const end = Date.now() + 3500;
    (function frame() {
      confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0, y: 0.7 }, colors });
      confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1, y: 0.7 }, colors });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }

  async function loadBornAt() {
    const { data, error } = await sb.from('birth_moment').select('born_at, weight_grams').eq('id', 1).maybeSingle();
    if (error) { console.warn('birth_moment load failed', error); return; }
    bornAt = data && data.born_at;
    weightGrams = data && data.weight_grams;
    updateBirthBox();
    tick();
    if (bornAt && !hasFiredConfetti) {
      hasFiredConfetti = true;
      fireConfetti();
    }
  }

  // Birth modal
  const birthModal = document.getElementById('birth-modal');
  const birthWhen = document.getElementById('birth-when');
  const birthWeightInput = document.getElementById('birth-weight');
  const birthErr = document.getElementById('birth-error');

  function nowLocalDatetime() {
    const d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  document.getElementById('btn-born').addEventListener('click', () => {
    birthErr.style.display = 'none';
    birthWhen.value = nowLocalDatetime();
    birthWeightInput.value = weightGrams || '';
    birthModal.classList.add('show');
    setTimeout(() => birthWeightInput.focus(), 50);
  });
  document.getElementById('birth-cancel').addEventListener('click', () => birthModal.classList.remove('show'));
  birthModal.addEventListener('click', (e) => { if (e.target === birthModal) birthModal.classList.remove('show'); });
  document.getElementById('birth-submit').addEventListener('click', async () => {
    birthErr.style.display = 'none';
    const whenVal = birthWhen.value;
    const weight = parseInt(birthWeightInput.value, 10);
    if (!whenVal) { birthErr.textContent = 'Hora requerida'; birthErr.style.display = 'block'; return; }
    if (!weight || weight < 500 || weight > 7000) { birthErr.textContent = 'Peso debe estar entre 500 y 7000 g'; birthErr.style.display = 'block'; return; }
    const iso = new Date(whenVal).toISOString();
    const { error } = await sb.from('birth_moment').update({ born_at: iso, weight_grams: weight }).eq('id', 1);
    if (error) { birthErr.textContent = 'Error: ' + error.message; birthErr.style.display = 'block'; return; }
    birthModal.classList.remove('show');
    toast('¡Bienvenido Luca!', 'success');
    await loadBornAt();
  });

  // ---------- Auth ----------
  const loginModal = document.getElementById('login-modal');
  const loginEmail = document.getElementById('login-email');
  const loginPass = document.getElementById('login-pass');
  const loginErr = document.getElementById('login-error');
  const loginSubmit = document.getElementById('login-submit');
  const adminLink = document.getElementById('admin-link');

  function showLogin() {
    loginErr.style.display = 'none';
    loginModal.classList.add('show');
    setTimeout(() => loginEmail.focus(), 50);
  }
  function hideLogin() { loginModal.classList.remove('show'); }

  adminLink.addEventListener('click', (e) => {
    e.preventDefault();
    if (isAdmin) {
      if (confirm('¿Cerrar sesión?')) sb.auth.signOut();
    } else {
      showLogin();
    }
  });
  document.getElementById('login-cancel').addEventListener('click', hideLogin);
  loginModal.addEventListener('click', (e) => { if (e.target === loginModal) hideLogin(); });
  loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginSubmit.click(); });

  loginSubmit.addEventListener('click', async () => {
    loginErr.style.display = 'none';
    loginSubmit.disabled = true; loginSubmit.textContent = 'Entrando…';
    const { error } = await sb.auth.signInWithPassword({ email: loginEmail.value.trim(), password: loginPass.value });
    loginSubmit.disabled = false; loginSubmit.textContent = 'Entrar';
    if (error) {
      loginErr.textContent = 'Credenciales incorrectas';
      loginErr.style.display = 'block';
      return;
    }
    loginPass.value = '';
    hideLogin();
  });

  function applyAuth(session) {
    isAdmin = !!session;
    document.body.classList.toggle('is-admin', isAdmin);
    adminLink.textContent = isAdmin ? 'Cerrar sesión' : 'Soy Daddey';
  }

  sb.auth.getSession().then(({ data }) => applyAuth(data.session));
  sb.auth.onAuthStateChange((_event, session) => applyAuth(session));

  // ---------- Updates ----------
  const feedEl = document.getElementById('feed');

  async function loadUpdates() {
    const { data, error } = await sb.from('birth_updates')
      .select('id, created_at, text, photo_url')
      .order('created_at', { ascending: false })
      .limit(200);
    if (error) { console.warn('updates load failed', error); return; }
    updates = data || [];
    await loadAllComments();
    renderFeed();
  }

  async function loadAllComments() {
    if (!updates.length) { commentsByUpdate.clear(); return; }
    const ids = updates.map(u => u.id);
    const { data, error } = await sb.from('birth_comments')
      .select('id, update_id, created_at, name, text')
      .in('update_id', ids)
      .order('created_at', { ascending: true });
    if (error) { console.warn('comments load failed', error); return; }
    commentsByUpdate.clear();
    (data || []).forEach(c => {
      if (!commentsByUpdate.has(c.update_id)) commentsByUpdate.set(c.update_id, []);
      commentsByUpdate.get(c.update_id).push(c);
    });
  }

  function renderFeed() {
    feedEl.innerHTML = '';
    if (!updates.length) {
      const e = document.createElement('div');
      e.className = 'feed-empty';
      e.textContent = 'Aún no hay actualizaciones.';
      feedEl.appendChild(e);
      return;
    }
    updates.forEach(u => feedEl.appendChild(renderUpdate(u)));
  }

  function renderUpdate(u) {
    const card = document.createElement('div');
    card.className = 'card update';
    card.dataset.id = u.id;

    const meta = document.createElement('div');
    meta.className = 'update-meta';
    const time = document.createElement('div');
    time.className = 'update-time';
    time.textContent = relTime(u.created_at) + ' · ' + absTime(u.created_at);
    meta.appendChild(time);
    const del = document.createElement('button');
    del.className = 'update-del';
    del.title = 'Eliminar';
    del.textContent = '×';
    del.addEventListener('click', () => deleteUpdate(u));
    meta.appendChild(del);
    card.appendChild(meta);

    if (u.text) {
      const txt = document.createElement('div');
      txt.className = 'update-text';
      txt.textContent = u.text;
      card.appendChild(txt);
    }
    if (u.photo_url) {
      const img = document.createElement('img');
      img.className = 'update-photo';
      img.src = u.photo_url;
      img.loading = 'lazy';
      img.addEventListener('click', () => openLightbox(u.photo_url));
      card.appendChild(img);
    }

    card.appendChild(renderCommentsBlock(u));
    return card;
  }

  function renderCommentsBlock(u) {
    const wrap = document.createElement('div');
    wrap.className = 'comments';
    const title = document.createElement('div');
    title.className = 'comments-title';
    const list = commentsByUpdate.get(u.id) || [];
    title.textContent = list.length ? 'Comentarios (' + list.length + ')' : 'Comentarios';
    wrap.appendChild(title);

    if (!list.length) {
      const empty = document.createElement('div');
      empty.className = 'comments-empty';
      empty.textContent = 'Sé el primero en comentar.';
      wrap.appendChild(empty);
    } else {
      list.forEach(c => {
        const row = document.createElement('div');
        row.className = 'comment';
        const n = document.createElement('span'); n.className = 'comment-name'; n.textContent = c.name;
        const t = document.createElement('span'); t.className = 'comment-text'; t.textContent = ' · ' + c.text;
        const ts = document.createElement('span'); ts.className = 'comment-time'; ts.textContent = relTime(c.created_at);
        row.appendChild(n); row.appendChild(t); row.appendChild(ts);
        wrap.appendChild(row);
      });
    }

    const form = document.createElement('div');
    form.className = 'comment-form';
    const nameRow = document.createElement('div');
    nameRow.className = 'name-row';
    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.placeholder = 'Tu nombre';
    nameInput.maxLength = 80;
    nameInput.value = localStorage.getItem('commenter-name') || '';
    const textArea = document.createElement('textarea');
    textArea.placeholder = 'Escribe un comentario…';
    textArea.rows = 1;
    textArea.maxLength = 1000;
    nameRow.appendChild(nameInput);
    nameRow.appendChild(textArea);
    form.appendChild(nameRow);

    const actions = document.createElement('div');
    actions.className = 'actions';
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = 'Comentar';
    btn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      const text = textArea.value.trim();
      if (!name || !text) { toast('Nombre y comentario requeridos', 'error'); return; }
      btn.disabled = true; btn.textContent = '…';
      try {
        await postComment(u.id, name, text);
        localStorage.setItem('commenter-name', name);
        textArea.value = '';
        await loadUpdates();
      } catch (ex) {
        toast('Error: ' + (ex.message || ex), 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Comentar';
      }
    });
    actions.appendChild(btn);
    form.appendChild(actions);
    wrap.appendChild(form);
    return wrap;
  }

  async function postComment(updateId, name, text) {
    const { error } = await sb.from('birth_comments').insert({ update_id: updateId, name, text });
    if (error) throw error;
  }

  async function deleteUpdate(u) {
    if (!confirm('¿Eliminar esta actualización?')) return;
    if (u.photo_url && u.photo_url.startsWith(PUBLIC_BASE)) {
      const path = u.photo_url.slice(PUBLIC_BASE.length);
      sb.storage.from(BUCKET).remove([path]).catch(() => {});
    }
    const { error } = await sb.from('birth_updates').delete().eq('id', u.id);
    if (error) { toast('Error: ' + error.message, 'error'); return; }
    toast('Actualización eliminada', 'success');
    await loadUpdates();
  }

  // ---------- Admin post form ----------
  const upText = document.getElementById('up-text');
  const upPhoto = document.getElementById('up-photo');
  const upSubmit = document.getElementById('up-submit');
  const upError = document.getElementById('up-error');

  function slugify(s) {
    return s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9.]+/g, '-').replace(/^-+|-+$/g, '')
      .slice(0, 60) || 'foto';
  }

  async function uploadPhoto(file) {
    if (file.size > MAX_PHOTO) throw new Error('Foto demasiado grande (máx 10 MB)');
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = Date.now() + '-' + slugify(file.name.replace(/\.[^.]+$/, '')) + '.' + ext;
    const { error } = await sb.storage.from(BUCKET).upload(path, file, {
      upsert: false,
      contentType: file.type || undefined
    });
    if (error) throw error;
    return PUBLIC_BASE + path;
  }

  upSubmit.addEventListener('click', async () => {
    upError.style.display = 'none';
    const text = upText.value.trim();
    if (!text) { upError.textContent = 'Escribe algo'; upError.style.display = 'block'; return; }
    const file = upPhoto.files[0] || null;
    upSubmit.disabled = true; upSubmit.textContent = 'Publicando…';
    try {
      let photo_url = null;
      if (file) photo_url = await uploadPhoto(file);
      const { error } = await sb.from('birth_updates').insert({ text, photo_url });
      if (error) throw error;
      upText.value = ''; upPhoto.value = '';
      toast('Publicado', 'success');
      await loadUpdates();
    } catch (ex) {
      upError.textContent = ex.message || 'Error al publicar';
      upError.style.display = 'block';
    } finally {
      upSubmit.disabled = false; upSubmit.textContent = 'Publicar';
    }
  });

  // ---------- Realtime ----------
  sb.channel('birth-feed')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'birth_updates' }, () => loadUpdates())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'birth_comments' }, () => loadUpdates())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'birth_moment' }, () => loadBornAt())
    .subscribe();

  // ---------- Boot ----------
  loadBornAt();
  loadUpdates();

  // ---------- Service worker ----------
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
})();
</script>

</body>
</html>
